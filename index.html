<!DOCTYPE html>
<html>
    <head>
        <title> BODY MASS INDEX CALCULATOR</title>
        <link rel="stylesheet" href="style.css">
        
    </head>
    <body>
        <h1 style="color: blueviolet;"> <em>BMI CALCULATOR</em> </h1>
        <div class="container">
            <div id="step1" class="main-box step active">
                <div class="wlabel">
                    <label for="name"> Enter your name:</label>
                    <input type="text" id="name" placeholder="Enter first name">
                    <p id="message" style="color:red;"></p>
                </div>
                
                <div class="label">
                    <label for="email"> Enter your E-mail:</label>
                    <input type="email" id="email" placeholder="Enter E-mail">
                </div>
                <button onclick="NextButton()">NEXT</button>
                
            </div>

        
            <div id="step2"  class="main-box step">
                <h2 style="padding-left: 70px; text-transform: uppercase;"></h2>
                <div class="wlabel">
                    <label for="weight"> Enter your weight:</label>
                    <input type="number" id="weight" placeholder="Weight in kg">
                </div>
                
                <div class="label">
                    <label for="height"> Enter your height:</label>
                    <input type="number" id="height" placeholder="height in meters">
                </div>
                <button onclick="BodyMassIndex()">BMI calculator</button>
                <p id="result"></p>
            </div>
        </div>
        
        
        <script src="Bmi.js"></script>
    </body>
    
</html>
